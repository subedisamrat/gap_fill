version: '3.0'

services:
  db:
    container_name: autospace_db
    image: postgres
    restart: always
    ports:
      - 2000:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: nepal999
    volumes:
      - db_data_autospace:/var/lib/postgresql
volumes:
  db_data_autospace:
